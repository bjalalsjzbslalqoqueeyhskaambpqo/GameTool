name: Build APK

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: app/src/main/res/raw
          key: game-assets-v1

      - name: Download assets
        run: |
          mkdir -p app/src/main/res/raw
          mkdir -p app/src/main/res/drawable-nodpi
          BASE="https://raw.githubusercontent.com/bjalalsjzbslalqoqueeyhskaambpqo/GameTool/game-assets/assets"
          [ -f app/src/main/res/drawable-nodpi/wall.png ] || curl -L "$BASE/wall.png" -o app/src/main/res/drawable-nodpi/wall.png
          [ -f app/src/main/res/drawable-nodpi/floor.png ] || curl -L "$BASE/floor.png" -o app/src/main/res/drawable-nodpi/floor.png
          [ -f app/src/main/res/drawable-nodpi/ceiling.png ] || curl -L "$BASE/ceiling.png" -o app/src/main/res/drawable-nodpi/ceiling.png

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.1.1
      - name: Rename .jav to .java
        run: find . -name "*.jav" -exec bash -c 'mv "$1" "${1%.jav}.java"' _ {} \;

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create release keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -storetype JKS \
            -keystore keystore/release.jks \
            -storepass "DungeonReleaseStore2026!" \
            -keypass "DungeonReleaseKey2026!" \
            -alias dungeon-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Dungeon Game, OU=Mobile, O=Dungeon Studio, L=Buenos Aires, ST=Buenos Aires, C=AR"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: DungeonGame-debug
          path: app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: DungeonGame-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/*/release/*.apk
