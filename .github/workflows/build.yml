name: Build Android APK (Debug)

on:
  push:
    branches: ["**"]

jobs:
  export-android-debug:
    name: Android Debug Export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore $GITHUB_WORKSPACE/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null

      - name: Godot Android Export
        uses: dulvui/godot-android-export@v3.0.0
        with:
          working-directory: proyecto
          godot-version: 4.3
          keystore-release-path: ${{ github.workspace }}/debug.keystore
          keystore-release-user: androiddebugkey
          keystore-release-password: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: proyecto/**/*.apk
