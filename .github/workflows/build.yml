name: Build Android APK

on:
  push:
    branches: ["**"]

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: GameTool

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          
          mkdir -p ~/.config/godot
          touch ~/.config/godot/editor_settings-4.tres
          cat >> ~/.config/godot/editor_settings-4.tres << 'EOF'
export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
export/android/android_sdk_path = "/usr/lib/android-sdk"
export/android/debug_keystore = "/root/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF

      - name: Create export dirs
        run: mkdir -v -p proyecto/build/android

      - name: Export APK (debug)
        run: |
          cd proyecto
          godot --headless --verbose \
            --export-debug "Android" \
            build/android/${EXPORT_NAME}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-android
          path: proyecto/build/android/*.apk
