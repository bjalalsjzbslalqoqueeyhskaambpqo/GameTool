name: Build Android APK

on:
  push:
    branches: ["**"]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Godot Android Export
        uses: dulvui/godot-android-export@v4
        with:
          working-directory: proyecto
          godot-version: 4.3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameTool-apk
          path: proyecto/GameTool.apk
