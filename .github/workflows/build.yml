name: Build APK

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.1.1

      - name: Pull texture assets from game-assets branch
        run: |
          mkdir -p app/src/main/assets
          git fetch origin game-assets --depth=1
          git show origin/game-assets:assets/wall.png > app/src/main/assets/wall.png
          git show origin/game-assets:assets/floor.png > app/src/main/assets/floor.png
          git show origin/game-assets:assets/ceiling.png > app/src/main/assets/ceiling.png

      - name: Rename .jav to .java
        run: find . -name "*.jav" -exec bash -c 'mv "$1" "${1%.jav}.java"' _ {} \;

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: DungeonGame-debug
          path: app/build/outputs/apk/debug/*.apk
