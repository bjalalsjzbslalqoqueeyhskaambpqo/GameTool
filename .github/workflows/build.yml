name: Build Android APK (Debug)

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  export-android-debug:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: 4.3-stable
      GODOT_ZIP: Godot_v4.3-stable_linux.x86_64.zip
      GODOT_BIN: Godot_v4.3-stable_linux.x86_64
      GODOT_HEADLESS_ZIP: Godot_v4.3-stable_linux.x86_64_headless.zip
      GODOT_HEADLESS_BIN: Godot_v4.3-stable_linux.x86_64_headless
      EXPORT_TEMPLATES_TPZ: Godot_v4.3-stable_export_templates.tpz
      PROJECT_DIR: proyecto
      ANDROID_BUILD_TOOLS: "33.0.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (API 33)
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Download Godot 4.3 headless and export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Configure Godot Android SDK paths
        run: |
          # Generate debug keystore
          keytool -genkey -v \
            -keystore /home/runner/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          # Write editor settings
          mkdir -p /home/runner/.config/godot
          cat > /home/runner/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export APK (debug)
        run: |
          mkdir -p proyecto/build/android
          godot --headless --path proyecto --export-debug Android build/android/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: proyecto/build/android/app-debug.apk
          if-no-files-found: error
