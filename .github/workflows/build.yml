name: Build APK

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: app/src/main/res/raw
          key: game-assets-v2

      - name: Download assets
        run: |
          mkdir -p app/src/main/res/raw
          mkdir -p app/src/main/res/drawable-nodpi
          BASE="https://raw.githubusercontent.com/bjalalsjzbslalqoqueeyhskaambpqo/GameTool/game-assets/assets"
          fetch_png () {
            local src="$1"
            local dst="$2"
            if [ ! -f "$dst" ]; then
              curl -fL --retry 3 --retry-all-errors --connect-timeout 15 "$src" -o "$dst"
            fi
          }
          fetch_png "$BASE/wall.png" app/src/main/res/drawable-nodpi/wall.png
          fetch_png "$BASE/floor.png" app/src/main/res/drawable-nodpi/floor.png
          fetch_png "$BASE/ceiling.png" app/src/main/res/drawable-nodpi/ceiling.png
          python - <<'PY'
          from pathlib import Path
          import struct
          import zlib
          png_sig = b"\x89PNG\r\n\x1a\n"
          paths = [
              Path("app/src/main/res/drawable-nodpi/wall.png"),
              Path("app/src/main/res/drawable-nodpi/floor.png"),
              Path("app/src/main/res/drawable-nodpi/ceiling.png"),
          ]
          def chunk(tag: bytes, data: bytes) -> bytes:
              return (
                  struct.pack(">I", len(data))
                  + tag
                  + data
                  + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
              )
          def make_png_rgba(w: int, h: int, rgba=(96, 32, 32, 255)) -> bytes:
              raw = b"".join(
                  b"\x00" + bytes(rgba) * w
                  for _ in range(h)
              )
              ihdr = struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0)
              idat = zlib.compress(raw, 9)
              return png_sig + chunk(b"IHDR", ihdr) + chunk(b"IDAT", idat) + chunk(b"IEND", b"")
          def is_valid_png(data: bytes) -> bool:
              if len(data) < 67 or data[:8] != png_sig:
                  return False
              i = 8
              saw_ihdr = False
              saw_iend = False
              try:
                  while i + 12 <= len(data):
                      ln = struct.unpack(">I", data[i:i+4])[0]
                      tag = data[i+4:i+8]
                      start = i + 8
                      end = start + ln
                      crc_off = end
                      if crc_off + 4 > len(data):
                          return False
                      chunk_data = data[start:end]
                      crc = struct.unpack(">I", data[crc_off:crc_off+4])[0]
                      calc = zlib.crc32(tag + chunk_data) & 0xFFFFFFFF
                      if crc != calc:
                          return False
                      if tag == b"IHDR":
                          saw_ihdr = True
                      if tag == b"IEND":
                          saw_iend = True
                          return saw_ihdr
                      i = crc_off + 4
              except Exception:
                  return False
              return False
          fallback_png = make_png_rgba(4, 4)
          for p in paths:
              valid = p.exists() and is_valid_png(p.read_bytes())
              if not valid:
                  p.write_bytes(fallback_png)
                  print(f"[warn] replaced invalid texture with fallback PNG: {p}")
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.1.1
      - name: Rename .jav to .java
        run: find . -name "*.jav" -exec bash -c 'mv "$1" "${1%.jav}.java"' _ {} \;

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create release keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -storetype JKS \
            -keystore keystore/release.jks \
            -storepass "DungeonReleaseStore2026!" \
            -keypass "DungeonReleaseKey2026!" \
            -alias dungeon-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Dungeon Game, OU=Mobile, O=Dungeon Studio, L=Buenos Aires, ST=Buenos Aires, C=AR"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: DungeonGame-debug
          path: app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: DungeonGame-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/*/release/*.apk
